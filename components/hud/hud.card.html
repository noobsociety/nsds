<!-- @dsCard group="Components" viewport="640x340" name="HUD Components" subtitle="HUDBar · HUDLabel · HUDDivider — stat bars, pixel labels, and rules" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>window._bundleLoaded = false;</script>
<script src="../../_ds_bundle.js" onload="window._bundleLoaded = true;"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NS   = window.NoobSocietyDesignSystem_1fe4c5 || {};
const FONT = "'Press Start 2P', monospace";
const BG   = 'var(--ns-bg-1, #272822)';
const DIM  = 'var(--ns-ink-faint, #75715e)';

/* ── Inline HUDBar ── */
function HUDBar({ value=40, max=40, fillColor='#4caf73', trackColor='rgba(255,255,255,0.10)', height=14, style }) {
  const pct = max > 0 ? Math.max(0, Math.min(100, (value / max) * 100)) : 0;
  return (
    <div style={{ position:'relative', background:trackColor, height, overflow:'hidden', ...style }}>
      <div style={{ position:'absolute', inset:0, width:pct+'%', background:fillColor, transition:'width .35s ease-out' }}/>
      <span style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', paddingLeft:4,
                     fontSize:4, fontFamily:FONT, color:'#fff', pointerEvents:'none' }}>
        {value} / {max}
      </span>
    </div>
  );
}

/* ── Inline HUDLabel ── */
function HUDLabel({ text='Label', align='left', fontSize=5, color='#f8f8f2', style }) {
  const jc = align === 'center' ? 'center' : align === 'right' ? 'flex-end' : 'flex-start';
  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:jc,
                  paddingLeft:align==='center'?0:3, paddingRight:align==='right'?3:0,
                  fontFamily:FONT, fontSize, color, whiteSpace:'nowrap', overflow:'hidden',
                  width:'100%', height:'100%', ...style }}>
      {text}
    </div>
  );
}

const Section = ({ title, children }) => (
  <div style={{ marginBottom:18 }}>
    <p style={{ fontFamily:FONT, fontSize:5, color:DIM, marginBottom:8, letterSpacing:1 }}>{title}</p>
    {children}
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(
  <div style={{ background:BG, padding:'20px 24px', minHeight:'100vh' }}>

    <Section title="HUDBar — stat bar with fill + value overlay">
      <div style={{ display:'flex', flexDirection:'column', gap:4, maxWidth:280 }}>
        <HUDBar value={40} max={40} fillColor="var(--hud-hp-fill,#4caf73)"  trackColor="var(--hud-track,rgba(255,255,255,0.10))" height={14}/>
        <HUDBar value={8}  max={40} fillColor="var(--hud-hp-low,#cc3333)"   trackColor="var(--hud-track,rgba(255,255,255,0.10))" height={14}/>
        <HUDBar value={14} max={20} fillColor="var(--hud-mp-fill,#5b9bd5)"  trackColor="var(--hud-track,rgba(255,255,255,0.10))" height={14}/>
        <HUDBar value={4}  max={20} fillColor="var(--hud-mp-low,#4f7fc0)"   trackColor="var(--hud-track,rgba(255,255,255,0.10))" height={14}/>
      </div>
    </Section>

    <Section title="HUDLabel — left · center · right">
      <div style={{ display:'flex', flexDirection:'column', gap:3, maxWidth:280 }}>
        {['left','center','right'].map(align => (
          <div key={align} style={{ background:'rgba(255,255,255,0.04)',
                                    border:'1px solid rgba(255,255,255,0.08)', height:18 }}>
            <HUDLabel text="Rainbow Star" align={align} fontSize={5}/>
          </div>
        ))}
      </div>
    </Section>

    <Section title="HUDDivider — 1px rule, vertical or horizontal">
      <div style={{ display:'flex', gap:20, alignItems:'stretch', height:40 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <span style={{ fontFamily:FONT, fontSize:3.5, color:DIM }}>VERTICAL</span>
          <div style={{ width:1, height:'100%', background:'var(--ns-line, rgba(255,255,255,0.12))' }}></div>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:8, justifyContent:'center' }}>
          <span style={{ fontFamily:FONT, fontSize:3.5, color:DIM }}>HORIZONTAL</span>
          <div style={{ width:140, height:1, background:'var(--ns-line, rgba(255,255,255,0.12))' }}></div>
        </div>
      </div>
    </Section>

    <Section title="XP bars — BXP · TXP · WXP (4px thin, --hud-track background)">
      <div style={{ display:'flex', flexDirection:'column', gap:6, maxWidth:280 }}>
        {[['BXP','var(--hud-xp-base,#4488cc)',0.65],['TXP','var(--hud-xp-job,#8855cc)',0.40],['WXP','var(--hud-xp-weapon,#cc8844)',0.80]].map(([lbl,fill,pct]) => (
          <div key={lbl} style={{ display:'flex', alignItems:'center', gap:8 }}>
            <span style={{ fontFamily:FONT, fontSize:4, color:DIM, width:28, textAlign:'right' }}>{lbl}</span>
            <div style={{ flex:1, position:'relative', height:4, overflow:'hidden' }}>
              <div style={{ position:'absolute', inset:0, background:'var(--hud-track,rgba(255,255,255,0.10))' }}></div>
              <div style={{ position:'absolute', top:0, left:0, bottom:0, width:(pct*100)+'%', background:fill, transition:'width .35s' }}></div>
            </div>
          </div>
        ))}
      </div>
    </Section>

    <Section title="Refinement bar — 10 equal segments, gold fill">
      <div style={{ width:210, height:4, display:'flex', gap:1 }}>
        {Array.from({length:10}, (_,i) => (
          <div key={i} style={{ flex:1, height:'100%',
                                background: i < 1 ? 'var(--hud-gold,#e6db74)' : 'var(--hud-track,rgba(255,255,255,0.10))' }}></div>
        ))}
      </div>
    </Section>

  </div>
);
</script>
</body>
</html>
