function Icon({ name, size = 28 }) {
  const Svg = ICON_SVG[name];
  if (!Svg) return null;
  return (
    <span style={{ display:'inline-flex', alignItems:'center', justifyContent:'center',
                   width:size, height:size, imageRendering:'pixelated', flexShrink:0 }}>
      <Svg />
    </span>
  );
}

function Section({ title, children }) {
  return (
    <div style={{ marginBottom:18 }}>
      <p style={{ fontFamily:FONT, fontSize:5, color:DIM, marginBottom:10, letterSpacing:1 }}>{title}</p>
      {children}
    </div>
  );
}

function IconRow({ icons }) {
  return (
    <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
      {icons.map(name => (
        <div key={name} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:5 }}>
          <div style={{ width:44, height:44, background:'rgba(255,255,255,0.04)',
                        border:'1px solid rgba(255,255,255,0.08)',
                        display:'flex', alignItems:'center', justifyContent:'center' }}>
            <Icon name={name} size={28} />
          </div>
          <span style={{ fontFamily:FONT, fontSize:3.5, color:DIM }}>{name.toUpperCase()}</span>
        </div>
      ))}
    </div>
  );
}

    <Section title="WEAPONS — sword · staff · bow · katar · book · hammer">

    </Section>
    <Section title="RACES — human · beast · demon · angel · spirit">

    </Section>
    <Section title="SIZES — small · medium · large">

    </Section>
  </div>
