name: Bug report
description: Report something broken in NSDS.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Link a repo, paste a minimal example, or list the steps.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "@noobsociety/nsds@0.1.2"
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Framework, bundler, browser, or runtime details.
    validations:
      required: false
