name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Check
        run: npm run check

      - name: Build Storybook
        run: npm run build:storybook

      - name: Check published version
        id: published
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"

          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check publish token
        id: publish_token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check release tag target
        if: steps.published.outputs.exists == 'false' && steps.publish_token.outputs.available == 'true'
        env:
          PACKAGE_VERSION: ${{ steps.published.outputs.package_version }}
        shell: bash
        run: |
          tag="v${PACKAGE_VERSION}"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            tag_commit="$(git ls-remote --tags origin "refs/tags/${tag}^{}" | awk '{print $1}')"

            if [ "$tag_commit" != "$GITHUB_SHA" ]; then
              echo "Release tag ${tag} points at ${tag_commit}, not ${GITHUB_SHA}." >&2
              exit 1
            fi
          fi

      - name: Skip publish without token
        if: steps.published.outputs.exists == 'false' && steps.publish_token.outputs.available == 'false'
        env:
          PACKAGE_NAME: ${{ steps.published.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.published.outputs.package_version }}
        run: |
          echo "::notice::Skipping npm publish for ${PACKAGE_NAME}@${PACKAGE_VERSION}; NPM_TOKEN is not configured."

      - name: Publish
        if: steps.published.outputs.exists == 'false' && steps.publish_token.outputs.available == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_NAME: ${{ steps.published.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.published.outputs.package_version }}
        shell: bash
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is required to publish ${PACKAGE_NAME}@${PACKAGE_VERSION}." >&2
            exit 1
          fi

          npm run changeset:publish

      - name: Tag published version
        if: steps.published.outputs.exists == 'false' && steps.publish_token.outputs.available == 'true'
        run: node scripts/tag-release.mjs
