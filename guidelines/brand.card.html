<!-- @dsCard group="Brand" viewport="700x160" name="Logo & wordmark" subtitle="Logo usage and wordmark construction — pixel font + gold accent" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--ns-bg-1); padding: 24px 32px; display: flex; flex-wrap: wrap; gap: 40px; align-items: center; }
  .unit { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
  .label { font-family: var(--ns-font-pixel); font-size: 7px; color: var(--ns-ink-faint); }
  .mark { display: flex; align-items: center; gap: 12px; }
</style>
</head>
<body>
  <div class="unit">
    <div class="label">Default</div>
    <div class="mark">
      <img src="../assets/logo.png" style="height:40px;width:auto;display:block">
      <span style="font-family:var(--ns-font-pixel);font-size:16px;color:var(--ns-ink)">Noob<b style="color:var(--ns-gold)">Society</b></span>
    </div>
  </div>
  <div class="unit">
    <div class="label">Header (32px)</div>
    <div class="mark">
      <img src="../assets/logo.png" style="height:32px;width:auto;display:block">
      <span style="font-family:var(--ns-font-pixel);font-size:13px;color:var(--ns-ink)">Noob<b style="color:var(--ns-gold)">Society</b></span>
    </div>
  </div>
  <div class="unit">
    <div class="label">Icon only</div>
    <img src="../assets/logo.png" style="height:56px;width:auto;display:block">
  </div>
  <div class="unit">
    <div class="label">On dark glass</div>
    <div class="mark" style="background:var(--ns-glass);padding:12px 16px;border-radius:8px;border:1px solid var(--ns-line)">
      <img src="../assets/logo.png" style="height:28px;width:auto;display:block">
      <span style="font-family:var(--ns-font-pixel);font-size:11px;color:var(--ns-ink)">Noob<b style="color:var(--ns-gold)">Society</b></span>
    </div>
  </div>
</body>
</html>
