<!-- @dsCard group="Spacing" viewport="700x525" name="World Grid" subtitle="960×720 canvas — 3×3 terrain zones, each with an 8×8 tile grid" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a16;
    width: 700px;
    height: 525px;
    overflow: hidden;
  }

  /* ── Outer 3×3 ─────────────────────────────────── */
  .outer {
    width: 700px;
    height: 525px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows:    repeat(3, 1fr);
  }

  .cell-l { background: rgba(166, 226, 46, 0.10); padding: 5%; }
  .cell-d { background: rgba(50,  51,  43, 0.75); padding: 5%; }

  /* ── Inner 8×8 ─────────────────────────────────── */
  .inner {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows:    repeat(8, 1fr);
  }

  .ig {
    border-right:  1px dotted rgba(230, 219, 116, 0.55);
    border-bottom: 1px dotted rgba(230, 219, 116, 0.55);
  }

  .ig:nth-child(8n + 1) { border-left: 1px dotted rgba(230, 219, 116, 0.55); }
  .ig:nth-child(-n + 8) { border-top:  1px dotted rgba(230, 219, 116, 0.55); }
</style>
</head>
<body>
<div class="outer" id="grid"></div>
<script>
  const pattern = ['l','d','l','d','d','d','l','d','l'];
  const grid = document.getElementById('grid');
  pattern.forEach(type => {
    const cell = document.createElement('div');
    cell.className = 'cell-' + type;
    const inner = document.createElement('div');
    inner.className = 'inner';
    for (let i = 0; i < 64; i++) {
      const ig = document.createElement('div');
      ig.className = 'ig';
      inner.appendChild(ig);
    }
    cell.appendChild(inner);
    grid.appendChild(cell);
  });
</script>
</body>
</html>
