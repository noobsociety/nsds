<!-- @dsCard group="Brand" viewport="700x180" name="Backgrounds" subtitle="World imagery, star field, and ambient gradients" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--ns-bg-1); padding: 24px 28px; display: flex; gap: 16px; flex-wrap: wrap; }
  .unit { display: flex; flex-direction: column; gap: 10px; }
  .label { font-family: var(--ns-font-pixel); font-size: 7px; color: var(--ns-ink-faint); }
  .swatch { width: 120px; height: 100px; border-radius: 8px; border: 1px solid rgba(255,255,255,.12); overflow: hidden; }
</style>
</head>
<body>
  <div class="unit">
    <div class="label">Page base (body bg)</div>
    <div class="swatch" style="background-color:#272822;background-image:radial-gradient(ellipse 80% 55% at 88% 2%, rgba(249,38,114,.11), transparent 58%),radial-gradient(ellipse 55% 45% at 8% 12%, rgba(174,129,255,.07), transparent 52%),linear-gradient(180deg,#272822 0%,#1e1f1a 100%)"></div>
  </div>
  <div class="unit">
    <div class="label">World bg.png (hero)</div>
    <div class="swatch" style="background:linear-gradient(90deg, rgba(30,31,26,.97) 0%, rgba(30,31,26,.2) 100%),url('../assets/bg.png') center/cover no-repeat"></div>
  </div>
  <div class="unit">
    <div class="label">Plaza screenshot</div>
    <div class="swatch" style="background:url('../assets/plaza.png') center top/cover no-repeat"></div>
  </div>
  <div class="unit">
    <div class="label">Glass card surface</div>
    <div class="swatch" style="background:rgba(30,31,26,.88);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center">
      <span style="font-family:var(--ns-font-pixel);font-size:7px;color:var(--ns-ink-faint)">rgba(30,31,26<br>.88) + blur(8px)</span>
    </div>
  </div>
  <div class="unit">
    <div class="label">Footer bg-0</div>
    <div class="swatch" style="background:#1a1a16"></div>
  </div>
</body>
</html>
