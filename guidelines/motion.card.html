<!-- @dsCard group="Brand" viewport="700x160" name="Motion" subtitle="Keyframes and timing — bob, blink, live pulse, twinkle, arrow nudge" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--ns-bg-1); padding: 24px 32px; display: flex; gap: 40px; align-items: flex-end; flex-wrap: wrap; }
  .unit { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .label { font-family: var(--ns-font-pixel); font-size: 7px; color: var(--ns-ink-faint); }
  .sub { font-family: var(--ns-font-pixel); font-size: 6px; color: #49483e; }
  .bob { animation: ns-bob-plain 3.6s ease-in-out infinite; image-rendering: pixelated; }
  .blink { font-family: var(--ns-font-pixel); font-size: 10px; color: var(--ns-gold); animation: ns-blink 1.5s steps(1) infinite; }
  .live { width: 10px; height: 10px; border-radius: 50%; background: var(--ns-green); animation: ns-live 2.4s ease-in-out infinite; }
  .twinkle { font-size: 18px; color: var(--ns-ink); animation: ns-twinkle 5.5s ease-in-out infinite; }
</style>
</head>
<body>
  <div class="unit"><img class="bob" src="../assets/hero.png" style="height:72px;width:auto"><div class="label">ns-bob</div><div class="sub">3.6s idle</div></div>
  <div class="unit"><span class="blink">PRESS START</span><div class="label">ns-blink</div><div class="sub">1.5s steps(1)</div></div>
  <div class="unit"><span class="live"></span><div class="label">ns-live</div><div class="sub">2.4s pulse</div></div>
  <div class="unit"><span class="twinkle">✦</span><div class="label">ns-twinkle</div><div class="sub">5.5s fade</div></div>
  <div class="unit" style="font-family:var(--ns-font-pixel);font-size:7px;color:var(--ns-ink-faint);max-width:160px;line-height:1.8">
    <span style="color:var(--ns-ink-dim)">Fast: 150ms ease-out</span>
    <span>Base: 200ms ease-out</span>
    <span>Slow: 400ms</span>
    <span>Spring: cubic-bezier(.34,1.56,.64,1)</span>
  </div>
</body>
</html>
