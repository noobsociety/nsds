<!-- @dsCard group="Spacing" viewport="700x160" name="Radii & Shadows" subtitle="Border radius scale + shadow system (card, modal, button press)" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--ns-bg-1); padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; }
  .row { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
  .box { background: var(--ns-glass); border: 1px solid var(--ns-line-strong); width: 60px; height: 44px; display: flex; align-items: center; justify-content: center; }
  .label { font-family: var(--ns-font-pixel); font-size: 7px; color: var(--ns-ink-faint); text-align: center; margin-top: 6px; }
  .unit { display: flex; flex-direction: column; align-items: center; }
  .shadow-box { width: 80px; height: 44px; background: var(--ns-glass); border: 1px solid var(--ns-line-strong); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: var(--ns-font-pixel); font-size: 6px; color: var(--ns-ink-faint); text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="unit"><div class="box" style="border-radius:4px"></div><div class="label">sm · 4px</div></div>
    <div class="unit"><div class="box" style="border-radius:8px"></div><div class="label">md · 8px</div></div>
    <div class="unit"><div class="box" style="border-radius:10px"></div><div class="label">lg · 10px</div></div>
    <div class="unit"><div class="box" style="border-radius:12px"></div><div class="label">xl · 12px</div></div>
    <div class="unit"><div class="box" style="border-radius:9999px;width:80px"></div><div class="label">full</div></div>
    <div class="unit"><div class="shadow-box" style="box-shadow:0 16px 34px rgba(0,0,0,.38)">card</div><div class="label">card hover</div></div>
    <div class="unit"><div class="shadow-box" style="box-shadow:0 24px 56px rgba(0,0,0,.5)">modal</div><div class="label">modal</div></div>
    <div class="unit"><div class="shadow-box" style="box-shadow:0 3px 0 #b5a83f;background:var(--ns-gold);color:#1c1c17;font-family:var(--ns-font-pixel);font-size:6px">btn</div><div class="label">btn press</div></div>
  </div>
</body>
</html>
