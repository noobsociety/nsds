<!-- @dsCard group="Lab" viewport="667x375" name="Game View" subtitle="667×375 HUD — drag-and-drop 8×8 grid player card" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NoobSociety — Game View 667×375</title>
<link rel="stylesheet" href="../../styles.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #000;
  width: 100vw; height: 100vh;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
#stage {
  width: 667px; height: 375px;
  flex-shrink: 0; overflow: hidden; position: relative;
}

/* ── Grid toggle ───────────────────────────────── */
#grid-toggle {
  position: fixed;
  bottom: 12px;
  left: 12px;
  font-family: var(--hud-font);
  font-size: 4px;
  color: rgb(var(--ns-ink-rgb) / 0.35);
  background: var(--hud-bg-strong);
  border: 1px solid var(--ns-line);
  padding: 4px 7px;
  cursor: pointer;
  user-select: none;
  z-index: 1000;
  letter-spacing: 0.5px;
}
#grid-toggle:hover  { color: rgb(var(--ns-ink-rgb) / 0.7); border-color: var(--ns-line-strong); }
#grid-toggle.grid-on { color: var(--hud-gold); border-color: var(--ns-focus-ring); }

.grid-hidden .ig { border-color: transparent !important; }
.grid-hidden .cell-l { background: transparent !important; }
.grid-hidden .cell-d { background: transparent !important; }
/* When grid is off — hide all edit chrome */
.grid-hidden .rz       { display: none !important; }
.grid-hidden .del-btn  { display: none !important; }
.grid-hidden #align-bar { display: none !important; }
.grid-hidden [data-grid] { cursor: default !important; }
.grid-hidden .selected { outline: none !important; }
.world-bg {
  position: absolute; inset: 0;
  display: grid;
  grid-template-columns: repeat(3, calc(667px / 3));
  grid-template-rows:    repeat(3, calc(375px / 3));
}
.cell-l { background: rgb(var(--ns-green-rgb) / 0.10); padding: 4px; }
.cell-d { background: rgb(var(--ns-bg-2-rgb) / 0.75);  padding: 4px; }
.inner {
  width: 100%; height: 100%;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows:    repeat(8, 1fr);
  gap: 2px;
}
.ig { border-right: 1px dotted rgb(var(--ns-gold-rgb) / 0.55); border-bottom: 1px dotted rgb(var(--ns-gold-rgb) / 0.55); }
.ig:nth-child(8n+1) { border-left: 1px dotted rgb(var(--ns-gold-rgb) / 0.55); }
.ig:nth-child(-n+8)  { border-top:  1px dotted rgb(var(--ns-gold-rgb) / 0.55); }

/* ── HUD layer ──────────────────────────────────── */
.hud {
  position: absolute; inset: 0;
  font-family: var(--hud-font);
  color: var(--hud-text);
  pointer-events: none;
}
:root {
  --hud-pad: 4px;
  --hud-col: calc((667px / 3 - 8px) / 8);
  --hud-row: calc((375px / 3 - 8px) / 8);
}

/* ── Card grid ──────────────────────────────────── */
.hud-card {
  position: absolute;
  top: var(--hud-pad); left: var(--hud-pad);
  width:  calc(667px / 3 - 8px);
  height: calc(375px / 3 - 8px);
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows:    repeat(8, 1fr);
  pointer-events: auto;
}

/* ── Base element ───────────────────────────────── */
.hud-card > [data-grid] {
  cursor: grab;
  user-select: none;
  position: relative;
  --scale: 1;
  margin: 2px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hud-card > [data-grid].dragging  { cursor: grabbing; opacity: 0.35; }
.hud-card > [data-grid].selected  { outline: 1px solid rgb(var(--ns-gold-rgb) / 0.7); outline-offset: -1px; }

/* ── Resize handle ──────────────────────────────── */
.rz {
  position: absolute; bottom: 0; right: 0;
  width: 9px; height: 9px;
  cursor: nwse-resize !important;
  z-index: 20;
  clip-path: polygon(100% 0%, 100% 100%, 0% 100%);
  background: rgb(var(--ns-gold-rgb) / 0.65);
  pointer-events: auto;
}

/* ── Delete button ──────────────────────────────── */
.del-btn {
  position: absolute; top: 1px; right: 1px;
  width: 10px; height: 10px;
  background: rgb(var(--ns-pink-rgb) / 0.85);
  color: #fff;
  font-family: var(--hud-font); font-size: 5px;
  display: none;
  align-items: center; justify-content: center;
  cursor: pointer;
  z-index: 30; line-height: 1;
  pointer-events: auto;
}
.selected .del-btn { display: flex; }

/* ── Ghost ──────────────────────────────────────── */
#ghost {
  background: rgb(var(--ns-gold-rgb) / 0.10);
  border: 1px dashed rgb(var(--ns-gold-rgb) / 0.65);
  pointer-events: none; z-index: 80; display: none;
}
#ghost.active { display: block; }

/* ── Dragging mode grid overlay ─────────────────── */
.hud-card.drag-mode::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(to right,  rgba(255,255,255,0.07) 0 1px, transparent 1px 100%),
    repeating-linear-gradient(to bottom, rgba(255,255,255,0.07) 0 1px, transparent 1px 100%);
  background-size: var(--hud-col) var(--hud-row);
  pointer-events: none; z-index: 70;
}

/* ── Text elements ──────────────────────────────── */
.hud-card > [data-grid].ns-text,
.hud-card > [data-grid][data-custom] {
  font-size: 5px;
  white-space: nowrap;
  overflow: hidden;
  justify-content: flex-start;
  padding-left: 3px;
  z-index: 3;
}
.et { /* editable-text span */
  outline: none;
  pointer-events: none;
  min-width: 1px;
}
.et[contenteditable="true"] { pointer-events: auto; cursor: text; }

/* ── Align toolbar ──────────────────────────────── */
#align-bar {
  position: absolute;
  display: none; gap: 1px;
  z-index: 200; pointer-events: auto;
  padding-top: 2px;
}
#align-bar.show { display: flex; }
.ab {
  width: 14px; height: 10px;
  background: var(--hud-bg-strong);
  border: 1px solid var(--ns-focus-ring);
  color: rgb(var(--ns-ink-rgb) / 0.55);
  font-family: var(--hud-font); font-size: 4px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none;
}
.ab:hover  { border-color: rgb(var(--ns-gold-rgb) / 0.8); color: var(--ns-ink); }
.ab.on     { background: rgb(var(--ns-gold-rgb) / 0.18); border-color: var(--hud-gold); color: var(--hud-gold); }

/* ── Specific elements ──────────────────────────── */
#el-avatar { background: var(--hud-avatar-bg); border: 1.5px solid rgba(255,255,255,0.55); }
#el-sword svg, #el-human svg, #el-neutral svg, #el-medium svg, #el-guild svg {
  width: calc(18px * var(--scale)); height: calc(18px * var(--scale));
  image-rendering: pixelated; pointer-events: none;
}
#el-sword svg { width: calc(22px * var(--scale)); height: calc(22px * var(--scale)); }
.hud-icon-svg { display:block; image-rendering:pixelated; pointer-events:none; }
#el-name { font-size: 7px; z-index: 1; }
#el-hp   { background: var(--hud-track); overflow: hidden; z-index: 1; }
#el-mp   { background: var(--hud-track); overflow: hidden; z-index: 1; }
.bar-fill { position: absolute; inset: 0; }
#el-hp .bar-fill { background: var(--hud-hp-fill); width: 100%; }
#el-mp .bar-fill { background: var(--hud-mp-fill); width: 100%; }
.bar-text {
  position: absolute; inset: 0;
  display: flex; align-items: center;
  justify-content: flex-start; padding-left: 3px;
  font-size: 5px; color: #fff; pointer-events: none;
}
.hud-thin-bar {
  position: relative; width: 100%; height: 4px;
  overflow: hidden; align-self: center; flex-shrink: 0;
}
.hud-thin-bar-track { position: absolute; inset: 0; }
.hud-thin-bar-fill  { position: absolute; top: 0; left: 0; bottom: 0; transition: width .35s ease-out; }

.hud-divider-line { width:1px; height:100%; background:var(--hud-line); align-self:stretch; flex-shrink:0; }
.hud-refine {
  position: relative;
  width: 100%;
  height: 4px;
  overflow: hidden;
  display: flex;
  align-items: stretch;
  align-self: center;
  flex-shrink: 0;
  gap: 1px;
}
.hud-refine-seg {
  flex: 1;
  height: 100%;
  background: var(--hud-track);
}
.hud-refine-seg.filled { background: var(--hud-gold); }
</style>
</head>

<script>
/* ══════════════════════════════════════════
   WORLD GRID
   ══════════════════════════════════════════ */
(function() {
  const pat = ['l','d','l','d','d','d','l','d','l'];
  const root = document.getElementById('world');
  pat.forEach(function(t) {
    const cell = document.createElement('div');
    cell.className = 'cell-' + t;
    const inner = document.createElement('div');
    inner.className = 'inner';
    for (var i = 0; i < 64; i++) {
      const ig = document.createElement('div');
      ig.className = 'ig';
      inner.appendChild(ig);
    }
    cell.appendChild(inner);
    root.appendChild(cell);
  });
})();

/* ══════════════════════════════════════════
   GRID TOGGLE
   ══════════════════════════════════════════ */
(function() {
  const btn   = document.getElementById('grid-toggle');
  const stage = document.getElementById('stage');
  let on = localStorage.getItem('ns-grid-on') !== 'false';

  function apply() {
    stage.classList.toggle('grid-hidden', !on);
    btn.classList.toggle('grid-on', on);
    btn.textContent = on ? 'GRID ON' : 'GRID OFF';
    localStorage.setItem('ns-grid-on', on);
    window.hudGridOn = on;
  }
  btn.addEventListener('click', function(e) { e.stopPropagation(); on = !on; apply(); });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'g' || e.key === 'G') {
      if (document.activeElement && document.activeElement.contentEditable === 'true') return;
      on = !on; apply();
    }
  });
  apply();
})();

/* ══════════════════════════════════════════
   HUD MANAGER — single unified controller
   ══════════════════════════════════════════ */
(function() {
  const COLS = 8, ROWS = 8;
  const card  = document.getElementById('card');
  const ghost = document.getElementById('ghost');
  const alignBar = document.getElementById('align-bar');
  const alignBtns = alignBar.querySelectorAll('.ab');

  /* ── Storage keys ── */
  const S_LAYOUT  = 'ns-hud-layout';
  const S_DELETED = 'ns-hud-deleted';
  const S_TEXTS   = 'ns-hud-texts';
  const S_ALIGN   = 'ns-hud-align';
  const S_CUSTOM  = 'ns-hud-custom';

  function load(key, def) {
    try { return JSON.parse(localStorage.getItem(key) || 'null') || def; } catch(e) { return def; }
  }
  function save(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
  }

  /* ── Default layout ── */
  const DEF_LAYOUT = {
    'el-avatar':   { c1:1, r1:1, c2:4, r2:5 },
    'el-sword':    { c1:5, r1:4, c2:6, r2:5 },
    'el-lv':       { c1:1, r1:4, c2:4, r2:5 },
    'el-name':     { c1:4, r1:1, c2:9, r2:2 },
    'el-hp-label': { c1:4, r1:2, c2:5, r2:3 },
    'el-mp-label': { c1:4, r1:3, c2:5, r2:4 },
    'el-hp':       { c1:5, r1:2, c2:9, r2:3 },
    'el-mp':       { c1:5, r1:3, c2:9, r2:4 },
    'el-human':    { c1:5, r1:4, c2:7, r2:6 },
    'el-neutral':  { c1:7, r1:4, c2:9, r2:6 },
    'el-medium':   { c1:3, r1:4, c2:5, r2:6 },
    'el-bxp':      { c1:1, r1:5, c2:9, r2:6 },
    'el-txp':      { c1:1, r1:6, c2:9, r2:7 },
    'el-wxp':      { c1:1, r1:7, c2:9, r2:8 },
    'el-guild':    { c1:1, r1:8, c2:3, r2:9 },
    'el-divider':  { c1:5, r1:1, c2:6, r2:9 },
    'el-ref':       { c1:6, r1:8, c2:8, r2:9 },
  };
  const DEF_NAT = {
    'el-avatar':   { w:3, h:4 }, 'el-sword':    { w:2, h:2 },
    'el-lv':       { w:1, h:1 }, 'el-name':     { w:5, h:1 },
    'el-hp-label': { w:1, h:1 }, 'el-mp-label': { w:1, h:1 },
    'el-hp':       { w:5, h:1 }, 'el-mp':       { w:5, h:1 },
    'el-human':    { w:2, h:2 }, 'el-neutral':  { w:2, h:2 },
    'el-medium':   { w:2, h:2 }, 'el-bxp':      { w:8, h:1 },
    'el-txp':      { w:8, h:1 }, 'el-wxp':      { w:8, h:1 },
    'el-guild':    { w:2, h:1 },
    'el-divider':  { w:1, h:8 },
    'el-ref':       { w:3, h:1 },
  };

  const layout  = Object.assign({}, DEF_LAYOUT, load(S_LAYOUT, {}));
  const natural = Object.assign({}, DEF_NAT);
  const deleted = load(S_DELETED, []);
  const texts   = load(S_TEXTS,   {});
  const aligns  = load(S_ALIGN,   {});

  /* Migrate legacy sequential span IDs (et-0..et-5) → stable element-based IDs */
  const LEGACY = { 'et-0':'et-lv', 'et-1':'et-name', 'et-2':'et-hp-label', 'et-3':'et-mp-label', 'et-4':'et-hp', 'et-5':'et-mp' };
  var migrated = false;
  Object.keys(LEGACY).forEach(function(old) {
    if (texts[old] !== undefined && texts[LEGACY[old]] === undefined) {
      texts[LEGACY[old]] = texts[old]; delete texts[old]; migrated = true;
    }
  });
  if (migrated) save(S_TEXTS, texts);
  var   customs = load(S_CUSTOM,  []).filter(function(c){ return c.text && c.text.trim(); });

  /* ── Place element on grid ── */
  function place(id, pos) {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.gridColumn = pos.c1 + ' / ' + pos.c2;
    el.style.gridRow    = pos.r1 + ' / ' + pos.r2;
    const nat = natural[id];
    if (nat) {
      const sx = (pos.c2 - pos.c1) / nat.w;
      const sy = (pos.r2 - pos.r1) / nat.h;
      el.style.setProperty('--scale', Math.sqrt(sx * sy).toFixed(4));
    }
    layout[id] = pos;
  }

  /* ── toCell ── */
  function toCell(cx, cy) {
    const r = card.getBoundingClientRect();
    return {
      col: Math.max(1, Math.min(COLS, Math.floor((cx - r.left) / (r.width  / COLS)) + 1)),
      row: Math.max(1, Math.min(ROWS, Math.floor((cy - r.top)  / (r.height / ROWS)) + 1)),
    };
  }

  /* ══════════════════════
     DRAG / RESIZE STATE
     ══════════════════════ */
  var drag = null;

  function startMove(e, el) {
    if (!window.hudGridOn) return;  /* grid off — no drag */
    e.preventDefault();
    const pos = Object.assign({}, layout[el.id]);
    const mc  = toCell(e.clientX, e.clientY);
    drag = { mode:'move', el, pos, offC: mc.col - pos.c1, offR: mc.row - pos.r1, next: null };
    el.classList.add('dragging');
    card.classList.add('drag-mode');
    ghost.classList.add('active');
    ghost.style.gridColumn = pos.c1 + '/' + pos.c2;
    ghost.style.gridRow    = pos.r1 + '/' + pos.r2;
  }

  function startResize(e, el) {
    if (!window.hudGridOn) return;  /* grid off — no resize */
    e.preventDefault(); e.stopPropagation();
    const pos = Object.assign({}, layout[el.id]);
    drag = { mode:'resize', el, pos, next: null };
    el.classList.add('dragging');
    card.classList.add('drag-mode');
    ghost.classList.add('active');
    ghost.style.gridColumn = pos.c1 + '/' + pos.c2;
    ghost.style.gridRow    = pos.r1 + '/' + pos.r2;
  }

  document.addEventListener('mousemove', function(e) {
    if (!drag) return;
    const mc = toCell(e.clientX, e.clientY);
    if (drag.mode === 'move') {
      const w = drag.pos.c2 - drag.pos.c1, h = drag.pos.r2 - drag.pos.r1;
      const nc1 = Math.max(1, Math.min(COLS - w + 1, mc.col - drag.offC));
      const nr1 = Math.max(1, Math.min(ROWS - h + 1, mc.row - drag.offR));
      drag.next = { c1:nc1, r1:nr1, c2:nc1+w, r2:nr1+h };
    } else {
      drag.next = {
        c1: drag.pos.c1, r1: drag.pos.r1,
        c2: Math.max(drag.pos.c1+1, Math.min(COLS+1, mc.col+1)),
        r2: Math.max(drag.pos.r1+1, Math.min(ROWS+1, mc.row+1)),
      };
    }
    ghost.style.gridColumn = drag.next.c1 + '/' + drag.next.c2;
    ghost.style.gridRow    = drag.next.r1 + '/' + drag.next.r2;
  });

  document.addEventListener('mouseup', function() {
    if (!drag) return;
    if (drag.next) { place(drag.el.id, drag.next); save(S_LAYOUT, layout); }
    drag.el.classList.remove('dragging');
    card.classList.remove('drag-mode');
    ghost.classList.remove('active');
    drag = null;
  });

  /* ══════════════════════
     SELECT / DELETE STATE
     ══════════════════════ */
  var selId = null;

  function deselect() {
    if (!selId) return;
    const el = document.getElementById(selId);
    if (el) el.classList.remove('selected');
    selId = null;
  }

  function doDelete(id) {
    const el = document.getElementById(id);
    if (!el) return;
    const isCustom = el.hasAttribute('data-custom');
    el.remove();
    delete layout[id];
    delete natural[id];
    save(S_LAYOUT, layout);
    if (!isCustom) {
      if (!deleted.includes(id)) deleted.push(id);
      save(S_DELETED, deleted);
    } else {
      customs = customs.filter(function(c){ return c.id !== id; });
      save(S_CUSTOM, customs);
    }
    selId = null;
    hideAlign();
  }

  document.addEventListener('keydown', function(e) {
    if ((e.key === 'Delete' || e.key === 'Backspace') && selId) {
      if (document.activeElement && document.activeElement.contentEditable === 'true') return;
      e.preventDefault();
      doDelete(selId);
    }
    if (e.key === 'Escape') { deselect(); hideAlign(); }
  });

  /* ══════════════════════
     ALIGN TOOLBAR
     ══════════════════════ */
  var alignId = null;
  const ALIGN_MAP = { left:'flex-start', center:'center', right:'flex-end' };

  function applyAlign(id, a) {
    const el = document.getElementById(id);
    if (!el) return;
    aligns[id] = a;
    const jc = ALIGN_MAP[a];
    const pl = (a === 'center') ? '0' : '3px';
    const pr = (a === 'right')  ? '3px' : '0';
    if (id === 'el-hp' || id === 'el-mp') {
      const bt = el.querySelector('.bar-text');
      if (bt) { bt.style.justifyContent = jc; bt.style.paddingLeft = pl; bt.style.paddingRight = pr; }
    } else {
      el.style.justifyContent = jc;
      el.style.paddingLeft = pl;
      el.style.paddingRight = pr;
    }
    save(S_ALIGN, aligns);
  }

  function showAlign(id) {
    alignId = id;
    const el  = document.getElementById(id);
    const cr  = card.getBoundingClientRect();
    const er  = el.getBoundingClientRect();
    alignBar.style.left = (er.left - cr.left) + 'px';
    alignBar.style.top  = (er.bottom - cr.top + 2) + 'px';
    alignBar.classList.add('show');
    const cur = aligns[id] || 'left';
    alignBtns.forEach(function(b){ b.classList.toggle('on', b.dataset.a === cur); });
  }

  function hideAlign() {
    alignBar.classList.remove('show');
    alignId = null;
  }

  /* Align buttons — use mousedown to fire before any click-based deselect */
  alignBtns.forEach(function(btn) {
    btn.addEventListener('mousedown', function(e) {
      e.preventDefault(); e.stopPropagation();
      if (!alignId) return;
      const a = btn.dataset.a;
      applyAlign(alignId, a);
      alignBtns.forEach(function(b){ b.classList.toggle('on', b.dataset.a === a); });
    });
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
    });
  });

  /* ══════════════════════
     TEXT EDITING
     ══════════════════════ */
  function startEdit(span) {
    span.contentEditable = 'true';
    span.style.pointerEvents = 'auto';
    span.focus();
    try {
      const r = document.createRange();
      r.selectNodeContents(span);
      const s = window.getSelection();
      s.removeAllRanges(); s.addRange(r);
    } catch(e) {}
  }

  function commitEdit(span) {
    span.contentEditable = 'false';
    span.style.pointerEvents = 'none';
    const out = {};
    document.querySelectorAll('.et').forEach(function(s) {
      if (s.id) out[s.id] = s.textContent;
    });
    save(S_TEXTS, out);
  }

  /* Refinement bar — 10 equal segments */
  (function() {
    const bar   = document.getElementById('refine-bar');
    if (!bar) return;
    const VALUE = 1;
    const MAX   = 10;
    for (var i = 0; i < MAX; i++) {
      const seg = document.createElement('div');
      seg.className = 'hud-refine-seg' + (i < VALUE ? ' filled' : '');
      bar.appendChild(seg);
    }
  })();


  document.querySelectorAll('.et').forEach(function(span) {
    /* IDs are hardcoded in HTML — no sequential assignment needed */
    if (texts[span.id] !== undefined) span.textContent = texts[span.id];
    span.addEventListener('blur',    function()  { commitEdit(span); });
    span.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === 'Escape') { e.preventDefault(); span.blur(); }
    });
  });

  /* ══════════════════════
     ELEMENT WIRING
     ══════════════════════ */
  const TEXT_IDS = new Set(['el-name','el-lv','el-hp-label','el-mp-label','el-hp','el-mp']);

  function wireEl(id) {
    const el = document.getElementById(id);
    if (!el) return;

    /* Delete button */
    const delBtn = el.querySelector('.del-btn');
    if (delBtn) {
      delBtn.addEventListener('mousedown', function(e) { e.stopPropagation(); });
      delBtn.addEventListener('click',     function(e) { e.stopPropagation(); doDelete(id); });
    }

    /* Resize handle */
    const rz = el.querySelector('.rz');
    if (rz) {
      rz.addEventListener('mousedown', function(e) { startResize(e, el); });
    }

    /* Drag (mousedown on element body) */
    el.addEventListener('mousedown', function(e) {
      if (e.target.classList.contains('rz'))      return;
      if (e.target.classList.contains('del-btn')) return;
      if (e.target.classList.contains('et') && e.target.contentEditable === 'true') return;
      startMove(e, el);
    });

    /* Click: select + show align for text elements */
    el.addEventListener('click', function(e) {
      if (!window.hudGridOn) return;
      if (e.target.classList.contains('del-btn')) return;
      e.stopPropagation();
      /* Select */
      if (selId !== id) { deselect(); selId = id; el.classList.add('selected'); }
      /* Align toolbar for text elements */
      if (TEXT_IDS.has(id) || el.hasAttribute('data-custom') || el.classList.contains('ns-text')) {
        if (alignId === id) { hideAlign(); } else { showAlign(id); }
      } else {
        hideAlign();
      }
    });

    /* Double-click: enter text edit mode */
    el.addEventListener('dblclick', function(e) {
      if (!window.hudGridOn) return;
      e.stopPropagation();
      const span = el.querySelector('.et');
      if (span) startEdit(span);
    });
  }

  /* ══════════════════════
     RESTORE DELETED + INIT
     ══════════════════════ */
  deleted.forEach(function(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
    delete layout[id];
  });

  /* Restore saved aligns */
  Object.keys(aligns).forEach(function(id) {
    if (aligns[id] && aligns[id] !== 'left') applyAlign(id, aligns[id]);
  });

  /* Place all built-in elements */
  Object.keys(layout).forEach(function(id) {
    place(id, layout[id]);
    wireEl(id);
  });

  /* ══════════════════════
     CUSTOM TEXT ELEMENTS
     ══════════════════════ */
  var customCounter = 0;
  customs.forEach(function(c) {
    const m = c.id && c.id.match(/^custom-(\d+)$/);
    if (m) customCounter = Math.max(customCounter, parseInt(m[1]) + 1);
  });

  function saveCustoms() {
    const out = customs.map(function(c) {
      const el = document.getElementById(c.id);
      const span = el && el.querySelector('.et');
      return { id: c.id, pos: layout[c.id] || c.pos, text: span ? span.textContent : c.text };
    });
    save(S_CUSTOM, out);
  }

  function makeCustom(id, pos, text) {
    const el = document.createElement('div');
    el.id = id;
    el.setAttribute('data-grid', '');
    el.setAttribute('data-custom', '');
    el.classList.add('ns-text');

    const delBtn = document.createElement('div');
    delBtn.className = 'del-btn';
    delBtn.textContent = '×';
    el.appendChild(delBtn);

    const span = document.createElement('span');
    span.className = 'et';
    span.textContent = text || '';
    if (!span.id) span.id = 'cet-' + id;
    el.appendChild(span);

    /* Restore saved text */
    if (texts[span.id] !== undefined) span.textContent = texts[span.id];

    const rz = document.createElement('div');
    rz.className = 'rz';
    el.appendChild(rz);

    card.insertBefore(el, document.getElementById('ghost'));

    span.addEventListener('blur', function() {
      commitEdit(span);
      if (!span.textContent.trim()) {
        el.remove();
        customs = customs.filter(function(c){ return c.id !== id; });
        delete layout[id];
        save(S_CUSTOM, customs);
        save(S_LAYOUT, layout);
      } else {
        saveCustoms();
      }
    });
    span.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === 'Escape') { e.preventDefault(); span.blur(); }
    });

    const resolvedPos = layout[id] || pos || { c1:1, r1:1, c2:2, r2:2 };
    if (!resolvedPos.c1) resolvedPos.c1 = 1;
    if (!resolvedPos.r1) resolvedPos.r1 = 1;
    if (!resolvedPos.c2) resolvedPos.c2 = resolvedPos.c1 + 1;
    if (!resolvedPos.r2) resolvedPos.r2 = resolvedPos.r1 + 1;
    natural[id] = { w: resolvedPos.c2 - resolvedPos.c1, h: resolvedPos.r2 - resolvedPos.r1 };
    TEXT_IDS.add(id);
    place(id, resolvedPos);
    wireEl(id);

    return { el, span };
  }

  /* Restore saved custom elements */
  customs.forEach(function(c) { makeCustom(c.id, c.pos, c.text); });

  /* Double-click empty card → create custom text */
  card.addEventListener('dblclick', function(e) {
    if (!window.hudGridOn) return;
    if (e.target !== card) return;
    const cell = toCell(e.clientX, e.clientY);
    const id   = 'custom-' + (customCounter++);
    const pos  = { c1:cell.col, r1:cell.row, c2:cell.col+1, r2:cell.row+1 };
    const { span } = makeCustom(id, pos, '');
    customs.push({ id, pos, text:'' });
    saveCustoms();
    startEdit(span);
  });

  /* Click outside → deselect + hide align */
  document.addEventListener('click', function() { deselect(); hideAlign(); });

})();
</script>
</body>
</html>
